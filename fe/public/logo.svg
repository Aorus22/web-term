      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Main Terminal Shape -->
  <rect x="64" y="96" width="384" height="320" rx="24" ry="24" fill="#1e293b" />
  <rect x="80" y="112" width="352" height="288" rx="16" ry="16" fill="#0f172a" />
  
